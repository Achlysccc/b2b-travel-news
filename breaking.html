<script>
// 搜索功能（静态搜索）
const articles = [

];
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
if (searchInput) {
 searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('open'); return; }
  const matched = articles.filter(a => a.title.toLowerCase().includes(q)).slice(0, 8);
  if (!matched.length) {
   searchResults.innerHTML = '<div style="padding:14px 16px;color:#71717a;font-size:12px;">无结果</div>';
   searchResults.classList.add('open');
   return;
  }
  const sectorColors = {hotel:'sr-sector-hotel',flight:'sr-sector-flight',car:'sr-sector-car',travel:'sr-sector-travel'};
  searchResults.innerHTML = matched.map(a => `
   <div class="search-result-item" onclick="location.href='/b2b-travel-news/sector/'+a.sector+'.html'">
    <div class="sr-title">${a.title}</div>
    <div class="sr-meta">
     <span class="sr-sector ${sectorColors[a.sector]||''}">${a.sector}</span>
     ${a.region} · ${a.importance}星
    </div>
   </div>`).join('');
  searchResults.classList.add('open');
 });
 document.addEventListener('click', e => {
  if (!e.target.closest('.search-bar')) searchResults.classList.remove('open');
 });
}
</script>
