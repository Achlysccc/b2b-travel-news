name: Deploy B2B Travel News

on:
  push:
    branches: [ master ]
  schedule:
    # 每天 0:00 UTC (北京时间 8:00) 自动运行
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser pyyaml jinja2 requests
    
    - name: Run crawler
      run: |
        python crawler.py
      env:
        PYTHONPATH: .
    
    - name: Build site
      run: |
        python -c "from generator.site_builder import build_site; build_site()"
      env:
        PYTHONPATH: .
    
    - name: Check output
      run: |
        echo "=== Output directory ==="
        ls -la output/
        echo "========================"
    
    - name: Deploy to gh-pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages
        folder: output
        clean: true
        git-config-name: 'GitHub Actions'
        git-config-email: 'actions@github.com'
