name: Deploy B2B Travel News

on:
  push:
    branches: [ master ]
  schedule:
    # 每天 0:00 UTC (北京时间 8:00) 自动运行
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser pyyaml jinja2 requests
    
    - name: Run crawler
      run: |
        python crawler.py
      env:
        PYTHONPATH: .
    
    - name: Build site
      id: build
      run: |
        python -c "from generator.site_builder import build_site; build_site()"
      env:
        PYTHONPATH: .
    
    - name: Check output directory
      run: |
        echo "=== Output directory contents ==="
        ls -la output/ || echo "output directory not found!"
        echo "==============================="
    
    - name: Deploy to gh-pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output
        force_orphan: true
        keep_files: false
